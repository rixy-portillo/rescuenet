services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: rescuenet
      POSTGRES_PASSWORD: rescuenet_dev
      POSTGRES_DB: rescuenet
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rescuenet"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
